        <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* HERO SECTION */
    .hero { 
        position: relative;
        height: 50vh; /* only top part of screen */
        overflow: hidden;
    }

    .hero video {
        position: absolute;
        top: 50%;
        left: 50%;
        min-width: 100%;
        min-height: 100%;
        transform: translate(-50%, -50%);
        object-fit: cover;
    }

    /* Overlay (dark gradient for readability) */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.7));
    }

    /* Text content */
    .hero-content {
        position: relative;
        z-index: 2;
        color: white;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
    }

    .hero-content h1 {
        font-size: 3rem;
        margin: 0;
    }

    .hero-content p {
        font-size: 1.2rem;
    } 
   


.comfort img{
    width:300px;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}.casual img{
    width:300px;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}.active img{
    width:300px;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}
</style>
</head>
<body>

<section class="hero">
